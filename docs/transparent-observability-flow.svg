<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title description">
  <title id="title">Transparent observability flow</title>
  <desc id="description">A normal user request and response pass through transparent CLI and API client layers to a model API endpoint. The client layers also emit background telemetry to a daemon, then PostgreSQL and Grafana engineering view.</desc>
  <defs>
    <marker id="arrow-request" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
    <marker id="arrow-response" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#059669"/></marker>
    <marker id="arrow-telemetry" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker>
    <style>
      .heading { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 23px; font-weight: 700; }
      .sub { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 16px; }
      .note { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 15px; }
      .solid { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .transparent { fill: #f8fafc; fill-opacity: 0.45; stroke: #7c3aed; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .request { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-request); }
      .response { fill: none; stroke: #059669; stroke-width: 4; marker-end: url(#arrow-response); }
      .telemetry { fill: none; stroke: #7c3aed; stroke-width: 3.5; marker-end: url(#arrow-telemetry); }
    </style>
  </defs>

  <rect width="1500" height="920" fill="#f8fafc"/>
  <text x="750" y="70" text-anchor="middle" class="heading" font-size="36" font-weight="700">Transparent observability flow</text>
  <text x="750" y="106" text-anchor="middle" class="heading" font-size="19" fill="#475569">The user path remains normal; telemetry is emitted silently in the background.</text>

  <text x="315" y="156" class="heading" font-size="17" font-weight="700" fill="#2563eb">USER REQUEST / RESPONSE PATH</text>
  <text x="912" y="156" class="heading" font-size="17" font-weight="700" fill="#7c3aed">BACKGROUND TELEMETRY PATH</text>

  <rect x="120" y="190" width="390" height="86" rx="16" class="solid"/>
  <text x="315" y="242" text-anchor="middle" class="label">User Request</text>

  <rect x="120" y="340" width="390" height="96" rx="16" class="transparent"/>
  <text x="315" y="386" text-anchor="middle" class="label" fill="#5b21b6">CLI / App Client</text>
  <text x="315" y="413" text-anchor="middle" class="sub">transparent pass-through layer</text>

  <rect x="120" y="500" width="390" height="96" rx="16" class="transparent"/>
  <text x="315" y="546" text-anchor="middle" class="label" fill="#5b21b6">Model API Client</text>
  <text x="315" y="573" text-anchor="middle" class="sub">transparent pass-through layer</text>

  <rect x="120" y="660" width="390" height="86" rx="16" class="solid"/>
  <text x="315" y="712" text-anchor="middle" class="label">Model API Endpoint</text>

  <rect x="120" y="810" width="390" height="72" rx="16" class="solid"/>
  <text x="315" y="855" text-anchor="middle" class="label">User Response</text>

  <path d="M315 276 L315 660" class="request"/>
  <path d="M510 703 C610 703 610 846 510 846" class="response"/>
  <text x="548" y="783" class="note" fill="#059669">model response</text>

  <path d="M510 388 L760 388 L760 488 L855 488" class="telemetry"/>
  <path d="M510 548 L760 548 L760 488" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
  <circle cx="760" cy="488" r="7" fill="#7c3aed"/>
  <text x="596" y="365" text-anchor="middle" class="note" fill="#6d28d9">client / process event</text>
  <text x="638" y="585" text-anchor="middle" class="note" fill="#6d28d9">provider usage event</text>

  <rect x="855" y="420" width="390" height="136" rx="18" class="solid" stroke="#7c3aed"/>
  <text x="1050" y="468" text-anchor="middle" class="label">Local Observatory Daemon</text>
  <text x="1050" y="500" text-anchor="middle" class="sub">normalize · enrich · buffer · batch</text>

  <rect x="855" y="640" width="390" height="104" rx="18" class="solid"/>
  <text x="1050" y="685" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="1050" y="714" text-anchor="middle" class="sub">normalized telemetry store</text>

  <rect x="855" y="810" width="390" height="72" rx="18" class="solid"/>
  <text x="1050" y="855" text-anchor="middle" class="label">Grafana · Engineering View</text>

  <path d="M1050 556 L1050 640" class="telemetry"/>
  <path d="M1050 744 L1050 810" class="telemetry"/>

  <line x1="80" y1="145" x2="80" y2="890" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="800" y1="145" x2="800" y2="890" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="907" text-anchor="middle" class="note">foreground</text>
  <text x="800" y="907" text-anchor="middle" class="note">silent background collection</text>
</svg>
